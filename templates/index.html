<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoCanva</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="icon" type="image/svg+xml" href="/static/assets/logo.svg">
</head>
<body>
    <div class="app">
        <div class="prompt-bar expanded" id="prompt-bar">
            <div class="prompt-bar-header">
                <img class="logo" src="/static/assets/logo.svg" alt="LoCanva" aria-hidden="true">
                <button class="prompt-toggle" id="prompt-toggle" aria-expanded="true">
                    <span class="material-icon">edit</span> Describe your image
                </button>
                <button id="theme-toggle" aria-label="Switch to light mode" title="Toggle theme"></button>
            </div>
            <div class="prompt-content" id="prompt-content">
                <textarea id="prompt" placeholder="Describe the image you want to generate…" rows="3"></textarea>
                <div class="buttons">
                    <button id="generate-btn">Generate</button>
                    <button id="optimize-btn">Optimize &amp; Generate</button>
                </div>
            </div>
        </div>
        <main class="image-area">
            <div id="image-container" class="image-container hidden">
                <img id="generated-image" alt="Generated image" />
                <button id="download-btn" class="download-btn" title="Download image" aria-label="Download image">
                    <span class="material-icon">download</span>
                </button>
            </div>
            <div id="loading-overlay" class="loading-overlay hidden">
                <img class="loading-overlay-spinner" src="/static/assets/logo.svg" alt="">
                <span id="loading-msg">Generating image…</span>
                <div id="optimized-prompt-display" class="optimized-prompt hidden"></div>
            </div>
            <div id="blocked-msg" class="blocked-msg hidden"></div>
            <div id="error-msg" class="error-msg hidden"></div>
        </main>
    </div>
    <footer>
        <p>Powered by <a href="https://ollama.com" target="_blank" rel="noopener">Ollama</a> · running locally on your machine</p>
    </footer>
    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
