<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoCanva</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="icon" type="image/svg+xml" href="/static/assets/logo.svg">
</head>
<body>
    <div class="app">
        <div class="prompt-bar expanded" id="prompt-bar">
            <div class="prompt-bar-header">
                <img class="logo" src="/static/assets/logo.svg" alt="LoCanva" aria-hidden="true">
                <button class="prompt-toggle" id="prompt-toggle" aria-expanded="true">
                    <span class="material-icon">expand_more</span> Describe your image
                </button>
                <button id="theme-toggle" aria-label="Switch to light mode" title="Toggle theme"></button>
            </div>
            <div class="prompt-content" id="prompt-content">
                <div class="tab-bar" role="tablist">
                    <button id="tab-generate" class="tab active" role="tab" aria-selected="true">Generate</button>
                    <button id="tab-describe" class="tab" role="tab" aria-selected="false">Describe</button>
                </div>
                <div id="generate-panel" role="tabpanel">
                    <textarea id="prompt" placeholder="Describe the image you want to generate…" rows="3"></textarea>
                    <div class="buttons">
                        <button id="optimize-only-btn">Optimize Prompt</button>
                        <button id="generate-btn">Generate</button>
                    </div>
                </div>
                <div id="describe-panel" class="hidden" role="tabpanel">
                    <div class="upload-area">
                        <button id="upload-trigger-btn">
                            <span class="material-icon">upload</span> Choose Image
                        </button>
                        <input type="file" id="image-upload" accept="image/*" class="hidden">
                        <img id="upload-preview" class="hidden" alt="Preview of uploaded image">
                    </div>
                    <div id="describe-result" class="hidden"></div>
                    <div class="buttons">
                        <button id="describe-btn" disabled>Describe</button>
                        <button id="use-as-prompt-btn" class="hidden">Use as Prompt</button>
                    </div>
                </div>
            </div>
        </div>
        <main class="image-area">
            <div id="image-container" class="image-container hidden">
                <img id="generated-image" alt="Generated image" />
                <button id="enhance-btn" class="image-action-btn enhance-btn hidden" title="Enhance this image" aria-label="Enhance this image">
                    <span class="material-icon">auto_fix_high</span>
                </button>
                <button id="download-btn" class="image-action-btn download-btn" title="Download image" aria-label="Download image">
                    <span class="material-icon">download</span>
                </button>
            </div>
            <div id="loading-overlay" class="loading-overlay hidden">
                <img class="loading-overlay-spinner" src="/static/assets/logo.svg" alt="">
                <span id="loading-msg">Generating image…</span>
            </div>
            <div id="blocked-msg" class="blocked-msg hidden"></div>
            <div id="error-msg" class="error-msg hidden"></div>
            <div id="fallback-msg" class="fallback-msg hidden"></div>
        </main>
        <div id="history-panel" class="history-panel hidden" aria-label="Image history">
            <button id="history-toggle" class="history-toggle" aria-expanded="false" aria-controls="history-list">
                <span class="material-icon">photo_library</span>
                History
                <span id="history-count" class="history-count" aria-live="polite"></span>
            </button>
            <div id="history-list" class="history-list" aria-hidden="true" role="list"></div>
        </div>
    </div>
    <footer>
        <p>Powered by <a href="https://ollama.com" target="_blank" rel="noopener">Ollama</a> · running locally on your machine</p>
    </footer>
    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
